<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="A simple example of a blog preview card component"
    />
    <link rel="icon" href="https://fav.farm/🟢" />
    <link rel="stylesheet" href="./src/reset.css" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog preview card component</title>
  </head>
  <body id="body">
    <main id="main">
      <article class="blogcard">
        <picture>
          <source
            type="image/svg+xml"
            srcset="./src/assets/images/illustration-article.svg"
          />

          <source
            type="image/jpeg"
            srcset="./src/assets/images/illustration-article-small.jpg"
          />

          <img
            class="blogcard__thumbnail"
            src="./src/assets/images/illustration-article.svg"
            alt="HTML &amp; CSS foundations thumbnail"
            srcset="
              ./src/assets/images/illustration-article-small.jpg  375w,
              ./src/assets/images/illustration-article.svg       1440w
            "
          />
        </picture>

        <section class="blogcard__info">
          <div class="blogcard__tags-holder">
            <span class="blogcard__tag">Learning</span>
          </div>

          <span> Published 21 Dec 2023 </span>

          <h1 class="blogcard__heading">HTML &amp; CSS foundations</h1>

          <p class="blogcard__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>

          <div class="blogcard__author">
            <picture>
              <source
                type="image/webp"
                srcset="./src/assets/images/image-avatar.webp"
              />

              <source
                type="image/webp"
                srcset="./src/assets/images/image-avatar-small.webp"
              />

              <img
                width="64"
                height="65"
                src="./src/assets/images/image-avatar.webp"
                alt="Image of Greg Hooper"
                srcset="
                  ./src/assets/images/image-avatar-small.webp  375w,
                  ./src/assets/images/image-avatar.webp       1440w
                "
              />
            </picture>
            <span>Greg Hooper</span>
          </div>
        </section>
      </article>
    </main>
  </body>
</html>
